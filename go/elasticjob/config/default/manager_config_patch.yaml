apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--jobmanagement=controller_manager_config.yaml"
        volumeMounts:
        - name: manager-jobmanagement
          mountPath: /controller_manager_config.yaml
          subPath: controller_manager_config.yaml
      volumes:
      - name: manager-jobmanagement
        configMap:
          name: manager-jobmanagement
